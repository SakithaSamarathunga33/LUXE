<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>LUXE — Modern Fashion</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,600;0,700;0,800;1,500;1,600&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="app/styles.css"/>
<style>
  /* ---------- responsive utilities ---------- */
  .show-mob{display:none}
  @media(max-width:980px){
    .hide-mob{display:none!important}
    .show-mob{display:flex!important}
    .prod-grid-4{grid-template-columns:repeat(2,1fr)!important}
    .foot-grid{grid-template-columns:1fr 1fr!important}
    .shop-layout{grid-template-columns:1fr!important}
    .pdp{grid-template-columns:1fr!important;gap:36px!important}
    .pdp-info{position:static!important}
    .rev-grid{grid-template-columns:1fr!important;gap:32px!important}
    .hero-split{grid-template-columns:1fr!important}
    .hero-split>div:first-child{min-height:52vh}
    .qv{grid-template-columns:1fr!important}
    .gallery{grid-template-columns:1fr!important}
    .gthumbs{flex-direction:row!important;order:2;overflow-x:auto}
    .gthumbs button{flex:0 0 72px}
    body{padding-bottom:64px}
    .sticky-bar{padding:10px 22px!important}
  }
  @media(max-width:768px){
    .cat-grid{grid-template-columns:1fr!important}
    .cat-cell{height:380px!important}
    .prod-grid-3{grid-template-columns:repeat(2,1fr)!important}
  }
  @media(max-width:430px){
    .prod-grid-3,.prod-grid-4{grid-template-columns:1fr!important}
    .foot-grid{grid-template-columns:1fr!important;gap:30px!important}
    .foot-bottom{flex-direction:column;align-items:flex-start!important}
  }
  /* motion off */
  body.no-motion .reveal{opacity:1!important;transform:none!important}
  .pdp-sticky{bottom:0}
  @media(max-width:980px){ .pdp-sticky{bottom:64px} }
  body.no-motion .marquee-track{animation:none!important}
  body.no-motion [data-hero]{opacity:1!important;transform:none!important}
  #boot{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:500;transition:opacity .5s}
  #boot.gone{opacity:0;pointer-events:none}
  #boot .serif{font-size:34px;letter-spacing:.3em;padding-left:.3em;animation:pulse 1.6s ease-in-out infinite}
  @keyframes pulse{0%,100%{opacity:.35}50%{opacity:1}}
</style>
</head>
<body>
<div id="boot"><span class="serif">LUXE</span></div>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>

<script type="text/babel" src="app/tweaks-panel.jsx"></script>
<script type="text/babel" src="app/icons.jsx"></script>
<script type="text/babel" src="app/ui.jsx"></script>
<script type="text/babel" src="app/card.jsx"></script>
<script type="text/babel" src="app/nav.jsx"></script>
<script type="text/babel" src="app/home.jsx"></script>
<script type="text/babel" src="app/listing.jsx"></script>
<script type="text/babel" src="app/product.jsx"></script>
<script type="text/babel" src="app/cart.jsx"></script>
<script type="text/babel" src="app/sizeguide.jsx"></script>
<script type="text/babel" src="app/main.jsx"></script>
<script>
  // hide boot splash once React has mounted
  (function(){
    var tries=0;
    var t=setInterval(function(){
      tries++;
      if(document.querySelector("#root header") || tries>40){
        var b=document.getElementById("boot"); if(b) b.classList.add("gone");
        setTimeout(function(){ if(b&&b.parentNode) b.parentNode.removeChild(b); },600);
        clearInterval(t);
      }
    },120);
  })();
</script>
</body>
</html>
